<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: black; }
        canvas { border: 1px solid white; }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        // Create the pong paddle
        const paddleWidth = 10;
        const paddleHeight = 100;
        let playerPaddle = { x: 0, y: (canvas.height - paddleHeight) / 2, width: paddleWidth, height: paddleHeight, color: 'white' };
        let computerPaddle = { x: canvas.width - paddleWidth, y: (canvas.height - paddleHeight) / 2, width: paddleWidth, height: paddleHeight, color: 'white' };

        // Create the pong ball
        const ballSize = 10;
        let ball = { x: canvas.width / 2, y: canvas.height / 2, size: ballSize, speedX: 5, speedY: 5, color: 'white' };

        // Control the player paddle
        document.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            playerPaddle.y = event.clientY - rect.top - playerPaddle.height / 2;
        });

        // Update game
        function update() {
            // Move the ball
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            // Ball collision with top and bottom
            if (ball.y + ball.size > canvas.height || ball.y < 0) {
                ball.speedY = -ball.speedY;
            }

            // Ball collision with paddles
            if ((ball.x < playerPaddle.x + paddleWidth && ball.y > playerPaddle.y && ball.y < playerPaddle.y + paddleHeight) || 
                (ball.x + ball.size > computerPaddle.x && ball.y > computerPaddle.y && ball.y < computerPaddle.y + paddleHeight)) {
                ball.speedX = -ball.speedX;
            }

            // Move the computer paddle
            computerPaddle.y += (ball.y - (computerPaddle.y + paddleHeight / 2)) * 0.1;

            // Reset ball if it goes out of bounds
            if (ball.x < 0 || ball.x > canvas.width) {
                ball.x = canvas.width / 2;
                ball.y = canvas.height / 2;
                ball.speedX = -ball.speedX;
            }
        }

        // Draw everything
        function draw() {
            // Clear the canvas
            context.clearRect(0, 0, canvas.width, canvas.height);

            // Draw paddles
            context.fillStyle = playerPaddle.color;
            context.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);

            context.fillStyle = computerPaddle.color;
            context.fillRect(computerPaddle.x, computerPaddle.y, computerPaddle.width, computerPaddle.height);

            // Draw ball
            context.fillStyle = ball.color;
            context.fillRect(ball.x, ball.y, ball.size, ball.size);
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
